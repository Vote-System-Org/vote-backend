# ─────────────────────────────────────────────────────────────────
# docker-compose.hub.yml
# Demarrage rapide depuis Docker Hub - aucun code source requis
# Usage : docker-compose -f docker-compose.hub.yml up -d
# Plateforme : http://localhost
# API Swagger : http://localhost:8000/api/docs/
# ─────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:15-alpine
    container_name: vote_postgres
    environment:
      POSTGRES_DB:       vote_db
      POSTGRES_USER:     vote_user
      POSTGRES_PASSWORD: vote_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vote_user -d vote_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vote_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: vicens2/vote-backend:latest
    container_name: vote_backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY:             change_me_in_production
      DEBUG:                  "False"
      DATABASE_URL:           postgresql://vote_user:vote_password@postgres:5432/vote_db
      REDIS_URL:              redis://redis:6379/0
      ALLOWED_HOSTS:          localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS:   "http://localhost,http://localhost:80"
      DJANGO_SETTINGS_MODULE: config.settings
      CLOUDINARY_CLOUD_NAME:  your_cloud_name
      CLOUDINARY_API_KEY:     your_api_key
      CLOUDINARY_API_SECRET:  your_api_secret
      SENDGRID_API_KEY:       your_sendgrid_key
      DEFAULT_FROM_EMAIL:     your_email
    command: sh -c "python manage.py migrate --no-input && python manage.py collectstatic --no-input && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --worker-class gevent --workers 4 --timeout 120 --access-logfile - --error-logfile -"

  celery_worker:
    image: vicens2/vote-backend:latest
    container_name: vote_celery_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY:             change_me_in_production
      DEBUG:                  "False"
      DATABASE_URL:           postgresql://vote_user:vote_password@postgres:5432/vote_db
      REDIS_URL:              redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings
      CLOUDINARY_CLOUD_NAME:  your_cloud_name
      CLOUDINARY_API_KEY:     your_api_key
      CLOUDINARY_API_SECRET:  your_api_secret
      SENDGRID_API_KEY:       your_sendgrid_key
    command: celery -A config worker --loglevel=info --concurrency=4

  celery_beat:
    image: vicens2/vote-backend:latest
    container_name: vote_celery_beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY:             change_me_in_production
      DEBUG:                  "False"
      DATABASE_URL:           postgresql://vote_user:vote_password@postgres:5432/vote_db
      REDIS_URL:              redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    image: vicens2/vote-frontend:latest
    container_name: vote_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: