name: Cron — Clôture automatique scrutins (RG06)

on:
  schedule:
    - cron: '*/5 * * * *'  # Toutes les 5 minutes
  workflow_dispatch:         # Déclenchement manuel possible

jobs:
  cloture:
    runs-on: ubuntu-latest
    name: Vérifier scrutins expirés

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clôturer scrutins expirés via API
        run: |
          echo "Appel de l'endpoint de clôture..."
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "X-Cron-Token: ${{ secrets.CRON_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://vote-backend-api.onrender.com/api/v1/public/cron/cloture/)

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "Status HTTP : $status"
          echo "Réponse     : $body"

          if [ "$status" != "200" ]; then
            echo "❌ Erreur : HTTP $status"
            exit 1
          fi

          echo "✅ Clôture exécutée avec succès"