name: Tests VoteSystem Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: Tests Django + Coverage

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       test_vote_db
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY:            test_secret_key_for_ci_pipeline_only
      DEBUG:                 'True'
      DATABASE_URL:          postgresql://test_user:test_password@localhost:5432/test_vote_db
      SENDGRID_API_KEY:      test_key
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY:    test
      CLOUDINARY_API_SECRET: test
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-omit=*/migrations/*,manage.py,*/asgi.py,*/wsgi.py,*/tests.py
        continue-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore