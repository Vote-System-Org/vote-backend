# render.yaml — Infrastructure as Code pour Render
# Services : Redis + Cron Job (plan Free)
# vote-backend-api et vote-db déjà existants sur Render

services:

  # ── Redis (cache + broker) ────────────────────────────────────────────────
  # - type: redis
  #   name: vote-redis
  #   region: oregon
  #   plan: free
  #   maxmemoryPolicy: allkeys-lru
  #   ipAllowList: []

  # ── Cron Job — clôture automatique scrutins (RG06) ───────────────────────
  - type: cron
    name: vote-cron-cloture
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    schedule: "* * * * *"
    startCommand: python manage.py cloture_scrutins_expires
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: vote-redis
          type: redis
          property: connectionString
      - key: SENDGRID_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: kenmatiov@gmail.com